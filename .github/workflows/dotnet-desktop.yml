name: .NET Desktop CI/CD

on:
  push:
    branches: ["main"]
    tags: ["v*"]

env:
  PROJECT_PATH: SMP/SMP.csproj
  OUTPUT_PATH: Output

jobs:

  # =========================
  # Build (main push)
  # =========================
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Debug Git Ref
      run: |
        Write-Host "GITHUB_REF=$env:GITHUB_REF"

    - name: Ensure SMP directory
      run: New-Item -ItemType Directory -Force -Path SMP

    - name: Restore
      run: dotnet restore $env:PROJECT_PATH

    - name: Download yt-dlp
      run: |
        Invoke-WebRequest `
          -Uri https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe `
          -OutFile SMP/yt-dlp.exe

    - name: Build
      run: dotnet build $env:PROJECT_PATH -c Release --no-restore


  # =========================
  # Release (tag push)
  # =========================
  release:
    runs-on: windows-latest

    # ✅ v prefix tag에서만 실행
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    # v1.2.3 → 1.2.3
    - name: Extract version
      id: version
      run: |
        $version = $env:GITHUB_REF -replace "refs/tags/v",""
        echo "VERSION=$version" >> $env:GITHUB_OUTPUT

    - name: Debug Version
      run: |
        Write-Host "VERSION=${{ steps.version.outputs.VERSION }}"

    - name: Ensure SMP directory
      run: New-Item -ItemType Directory -Force -Path SMP

    - name: Restore
      run: dotnet restore $env:PROJECT_PATH

    - name: Download yt-dlp
      run: |
        Invoke-WebRequest `
          -Uri https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe `
          -OutFile SMP/yt-dlp.exe

    - name: Build
      run: |
        dotnet build $env:PROJECT_PATH `
          -c Release `
          --no-restore `
          /p:Version=${{ steps.version.outputs.VERSION }}

    - name: Publish
      run: |
        dotnet publish $env:PROJECT_PATH `
          -c Release `
          -r win-x64 `
          --self-contained true `
          -o $env:OUTPUT_PATH `
          /p:Version=${{ steps.version.outputs.VERSION }}

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: SMP-${{ steps.version.outputs.VERSION }}
        path: ${{ env.OUTPUT_PATH }}

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.VERSION }}
        name: SMP v${{ steps.version.outputs.VERSION }}
        files: Output/**